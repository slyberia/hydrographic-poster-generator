# Google Cloud Build: build both images and deploy to Cloud Run.
#
# Prerequisites (one-time):
#   - Artifact Registry docker repo:  ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}
#   - Secret Manager secret ${_DB_SECRET} holding the PostGIS DATABASE_URL
#   - Cloud Build service account roles: run.admin, artifactregistry.writer,
#     secretmanager.secretAccessor, iam.serviceAccountUser
#
# The frontend needs the deployed backend URL at BUILD time (NEXT_PUBLIC_*
# values are inlined into the client bundle), so set _NEXT_PUBLIC_API_URL to
# the backend service URL. First deployment: run once, read the backend URL,
# then run again with the substitution set (or use a custom domain).
#
# Backend sizing (docs/PROJECTION_SCALEBAR_NOTES.md §13): the worst legal
# export raster is ~206 MiB before Cairo working copies (expect 2-3x peak),
# and export is CPU-bound single-request work — hence 2 GiB memory and
# concurrency 2. Do not raise concurrency without raising memory.

substitutions:
  _REGION: us-central1
  _AR_REPO: hydro
  _BACKEND_SERVICE: hydro-backend
  _FRONTEND_SERVICE: hydro-frontend
  _DB_SECRET: hydro-database-url
  _NEXT_PUBLIC_API_URL: http://localhost:8000
  _CORS_ORIGINS: http://localhost:3000

steps:
  # ---- backend ----
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_BACKEND_SERVICE}:$COMMIT_SHA
      - backend

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_BACKEND_SERVICE}:$COMMIT_SHA

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_BACKEND_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --memory=2Gi
      - --cpu=2
      - --concurrency=2
      - --timeout=300
      - --set-secrets=DATABASE_URL=${_DB_SECRET}:latest
      - --set-env-vars=CORS_ORIGINS=${_CORS_ORIGINS}
      - --allow-unauthenticated

  # ---- frontend ----
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_FRONTEND_SERVICE}:$COMMIT_SHA
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - frontend

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_FRONTEND_SERVICE}:$COMMIT_SHA

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_FRONTEND_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --port=3000
      - --memory=512Mi
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_BACKEND_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_FRONTEND_SERVICE}:$COMMIT_SHA
