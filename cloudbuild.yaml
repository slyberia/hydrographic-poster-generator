# Google Cloud Build: build both images and deploy to Cloud Run.
#
# Prerequisites (one-time):
#   - Artifact Registry docker repo:  ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}
#   - Secret Manager secret ${_DB_SECRET} holding the PostGIS DATABASE_URL
#   - Cloud Build service account roles: run.admin, artifactregistry.writer,
#     secretmanager.secretAccessor, iam.serviceAccountUser
#
# The pipeline dynamically discovers the Cloud Run URLs to break the circular 
# dependency between the frontend's build-time API URL requirement and the 
# backend's runtime CORS requirement.
#
# Backend sizing (docs/PROJECTION_SCALEBAR_NOTES.md §13): the worst legal
# export raster is ~206 MiB before Cairo working copies (expect 2-3x peak),
# and export is CPU-bound single-request work — hence 2 GiB memory and
# concurrency 2. Do not raise concurrency without raising memory.
#
# CPU is always-allocated (--no-cpu-throttling): the drone sensitivity sweep
# runs ~85 s of work in an asyncio background task after its 202 response
# returns (PHASE_C_SENSITIVITY_PLAN.md §3j); request-based CPU allocation
# would throttle that task to near zero and stall or kill sweeps.
#
# Image tag uses $BUILD_ID (always populated) rather than $COMMIT_SHA, so a
# manual `gcloud builds submit --config cloudbuild.yaml` works without a
# connected repo trigger — $COMMIT_SHA is empty on manual submits and would
# yield an invalid `image:` tag (trailing colon).

options:
  # Works with both the default and a user-specified Cloud Build service
  # account (the latter otherwise requires an explicit logs bucket).
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _AR_REPO: hydro
  _BACKEND_SERVICE: hydro-backend
  _FRONTEND_SERVICE: hydro-frontend
  _DB_SECRET: hydro-database-url

steps:
  # ---- 1. Build Backend ----
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_BACKEND_SERVICE}:$BUILD_ID
      - backend

  # ---- 2. Push Backend ----
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_BACKEND_SERVICE}:$BUILD_ID

  # ---- 3. Deploy Backend (Best-Effort CORS) ----
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - '-c'
      - |
        FRONTEND_URL=$$(gcloud run services describe ${_FRONTEND_SERVICE} --region=${_REGION} --format="value(status.url)" 2>/dev/null || echo "")
        
        if [ -n "$$FRONTEND_URL" ]; then
          CORS="$$FRONTEND_URL,http://localhost:3000"
          echo "Frontend discovered: $$FRONTEND_URL"
        else
          CORS="http://localhost:3000"
          echo "WARNING: Frontend service not found. Using localhost-only CORS."
          echo "The patch-backend-cors step will fix this after frontend deploys."
        fi
        
        gcloud run deploy ${_BACKEND_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_BACKEND_SERVICE}:$BUILD_ID \
          --region=${_REGION} \
          --platform=managed \
          --port=8080 \
          --memory=2Gi \
          --cpu=2 \
          --concurrency=2 \
          --timeout=300 \
          --no-cpu-throttling \
          --set-secrets=DATABASE_URL=${_DB_SECRET}:latest \
          --set-env-vars="^@@^CORS_ORIGINS=$$CORS" \
          --allow-unauthenticated

  # ---- 4. Discover Backend URL ----
  - id: discover-backend-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run services describe ${_BACKEND_SERVICE} --region=${_REGION} --format="value(status.url)" > /workspace/backend_url.txt

  # ---- 5. Build Frontend (Injecting Discovered Backend URL) ----
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        echo "Using API URL: $$BACKEND_URL"
        docker build \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_FRONTEND_SERVICE}:$BUILD_ID \
          --build-arg NEXT_PUBLIC_API_URL=$$BACKEND_URL \
          frontend

  # ---- 6. Push Frontend ----
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_FRONTEND_SERVICE}:$BUILD_ID

  # ---- 7. Deploy Frontend ----
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_FRONTEND_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --port=3000
      - --memory=512Mi
      - --allow-unauthenticated

  # ---- 8. Patch Backend CORS (Close the Loop) ----
  - id: patch-backend-cors
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - '-c'
      - |
        URLS_JSON=$$(gcloud run services describe ${_FRONTEND_SERVICE} --region=${_REGION} --format="value(metadata.annotations['run.googleapis.com/urls'])")
        # Extract URLs, remove brackets and quotes, replace spaces with commas if any
        URLS=$$(echo $$URLS_JSON | sed 's/[][]//g' | sed 's/"//g' | tr -s ' ' ',')
        
        if [ -n "$$URLS" ]; then
          CORS="$$URLS,http://localhost:3000"
        else
          FRONTEND_URL=$$(gcloud run services describe ${_FRONTEND_SERVICE} --region=${_REGION} --format="value(status.url)")
          CORS="$$FRONTEND_URL,http://localhost:3000"
        fi
        
        echo "Patching backend CORS with: $$CORS"
        
        gcloud run services update ${_BACKEND_SERVICE} \
          --region=${_REGION} \
          --update-env-vars="^@@^CORS_ORIGINS=$$CORS"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_BACKEND_SERVICE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_FRONTEND_SERVICE}:$BUILD_ID
