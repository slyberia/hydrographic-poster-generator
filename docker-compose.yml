# Local development stack. Point DATABASE_URL at your PostGIS instance
# (hosted Supabase, local Supabase CLI, or a local Docker PostGIS):
#
#   DATABASE_URL=postgresql://user:pass@host:5432/db docker compose up --build
#
# Frontend: http://localhost:3000   Backend API: http://localhost:8000

services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL to your PostGIS connection string}
      CORS_ORIGINS: http://localhost:3000
      SUPABASE_URL: ${SUPABASE_URL:-}
      # Local-dev conveniences; both default OFF in production deploys.
      ENABLE_DEBUG_ENDPOINTS: "true"
      ADMIN_API_KEY: ${ADMIN_API_KEY:-local-dev-admin-key}

  frontend:
    build:
      context: ./frontend
      args:
        # Inlined into the client bundle at build time; the browser calls
        # this URL directly, so it must be reachable from the host.
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
